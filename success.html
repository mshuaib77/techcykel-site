<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Submitted | TechCykel</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0c1117;
      --panel:#121923;
      --text:#ffffff;
      --muted:#b8c1cc;
      --green:#35d06d;
      --blue:#2f8cff;
      --blue-2:#00b7ff;
      --line:rgba(255,255,255,.09);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(circle at 75% 25%, rgba(47,140,255,.22), transparent 34%),
        radial-gradient(circle at 15% 80%, rgba(53,208,109,.12), transparent 34%),
        var(--bg);
      color:var(--text);
    }
    .card{
      max-width:620px;
      width:100%;
      background:linear-gradient(180deg,#162131,#101722);
      border:1px solid var(--line);
      border-radius:28px;
      padding:42px;
      box-shadow:0 24px 65px rgba(0,0,0,.42);
      text-align:center;
    }
    .logo{font-size:1.6rem;font-weight:900;letter-spacing:-1px;margin-bottom:22px;}
    .logo span{color:var(--blue-2);}
    .check{
      width:72px;
      height:72px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 24px;
      background:rgba(53,208,109,.13);
      border:1px solid rgba(53,208,109,.28);
      color:var(--green);
      font-size:2rem;
      font-weight:900;
    }
    h1{font-size:2.35rem;line-height:1.1;margin-bottom:14px;}
    p{color:var(--muted);line-height:1.7;margin-bottom:24px;}
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:15px 24px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--blue),var(--green));
      color:#041018;
      font-weight:900;
      text-decoration:none;
    }
    .contact{
      margin-top:24px;
      padding-top:24px;
      border-top:1px solid var(--line);
      font-size:.95rem;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">Tech<span>Cykel</span></div>
    <div class="check">✓</div>
    <h1>Request submitted.</h1>
    <p>Thank you. Your request was received and TechCykel will contact you shortly to confirm the service details, pricing if needed, and scheduling.</p>
    <a href="/">Back to homepage</a>
    <div class="contact">
      <div>718-300-6739</div>
      <div>ejoraa.s@techcykel.com</div>
      <div>250 E Sandford Blvd, Mt Vernon, New York</div>
    </div>
  </main>
</body>
</html>
